version: '3.8'

services:

  ollama:
    image: ollama/ollama:latest
    container_name: recruiter-bot-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: recruiter-bot-backend
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - CHAT_MODEL=llama3.2
      - EMBED_MODEL=nomic-embed-text
      - CANDIDATE_NAME=Nagesh Bellary
      - ADMIN_TOKEN=${ADMIN_TOKEN}
    volumes:
      - chroma_data:/app/chroma_db
      - ./backend/data:/app/data          # mount so resume files survive rebuilds
    ports:
      - "8000:8000"
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: recruiter-bot-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  ollama_data:
    driver: local
  chroma_data:
    driver: local

networks:
  default:
    name: recruiter-bot-net
